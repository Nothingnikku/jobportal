
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <section class="card border-0 shadow rounded-4 p-4">
          <h2 class="h5 mb-3">Add Feedback</h2>
          <form [formGroup]="feedbackForm" (ngSubmit)="submitFeedback()">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Recruiter ID</label>
                <input class="form-control" type="number" formControlName="recruiterId" />
              </div>
              <div class="col-md-6">
                <label class="form-label">Freelancer ID</label>
                <input class="form-control" type="number" formControlName="freelancerId" />
              </div>
            </div>
            <div class="mt-3">
              <label class="form-label">Rating (1-5)</label>
              <input class="form-control" type="number" min="1" max="5" formControlName="rating" />
            </div>
            <div class="mt-3">
              <label class="form-label">Comment</label>
              <textarea class="form-control" rows="4" formControlName="comment"></textarea>
            </div>
            <button class="btn btn-primary w-100 mt-3" [disabled]="feedbackForm.invalid">Submit Feedback</button>
          </form>
          <div class="alert alert-success py-2 mt-3 mb-0" *ngIf="resultText">{{ resultText }}</div>
          <div class="alert alert-danger py-2 mt-3 mb-0" *ngIf="errorMessage">{{ errorMessage }}</div>
        </section>
      </div>
    </div>

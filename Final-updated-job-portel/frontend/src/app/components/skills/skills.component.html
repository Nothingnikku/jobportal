
    <div class="row g-4">
      <div class="col-lg-4">
        <section class="card border-0 shadow rounded-4 p-4">
          <h2 class="h5 mb-3">Create Skill</h2>
          <form [formGroup]="skillForm" (ngSubmit)="createSkill()">
            <label class="form-label">Skill Name</label>
            <input class="form-control mb-3" formControlName="name" placeholder="Java, Angular, SQL..." />
            <button class="btn btn-primary w-100" [disabled]="skillForm.invalid">Save Skill</button>
          </form>
        </section>

        <section class="card border-0 shadow rounded-4 p-4 mt-4">
          <h2 class="h6 mb-3">Find Skill by ID</h2>
          <div class="input-group mb-3">
            <input class="form-control" type="number" [(ngModel)]="skillSearchId" placeholder="Enter skill ID" />
            <button class="btn btn-outline-primary" (click)="loadSkillById()">Find</button>
          </div>
          <p class="small mb-0" *ngIf="selectedSkill">
            Skill: <strong>{{ selectedSkill.skillId }} - {{ selectedSkill.name }}</strong>
          </p>
        </section>
      </div>

      <div class="col-lg-8">
        <section class="card border-0 shadow rounded-4 p-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h5 mb-0">Skills</h2>
            <button class="btn btn-outline-primary btn-sm" (click)="loadSkills()">Refresh</button>
          </div>
          <div class="table-responsive">
            <table class="table table-hover">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let skill of skills">
                  <td>{{ skill.skillId }}</td>
                  <td>{{ skill.name }}</td>
                  <td class="text-end">
                    <button class="btn btn-sm btn-outline-danger" (click)="deleteSkill(skill.skillId)">Delete</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <p class="small text-danger mb-0">{{ errorMessage }}</p>
        </section>
      </div>
    </div>

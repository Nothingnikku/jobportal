<div class="row justify-content-center">
  <div class="col-lg-5">
    <section class="card border-0 shadow rounded-4">
      <div class="card-body p-4">
        <h2 class="h4 fw-semibold mb-3">Forgot Password</h2>

        <form [formGroup]="form" (ngSubmit)="sendOtp()">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" formControlName="email" />
          </div>

          <button class="btn btn-dark w-100" [disabled]="form.invalid">
            Send OTP
          </button>
        </form>

        <div class="alert alert-success mt-3 mb-0 py-2" *ngIf="success">
          {{ success }}
        </div>
        <div class="alert alert-danger mt-3 mb-0 py-2" *ngIf="error">
          {{ error }}
        </div>

        <p class="small text-muted mt-3 mb-0">
          We will email you an OTP to reset your password.
        </p>
      </div>
    </section>
  </div>
</div>

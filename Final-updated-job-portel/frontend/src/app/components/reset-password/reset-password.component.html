<form [formGroup]="form" (ngSubmit)="reset()" class="card p-4">
  <h3>Reset Password</h3>

  <div class="mb-3">
    <label>Email</label>
    <input class="form-control" formControlName="email" readonly />
  </div>

  <div class="mb-3">
    <label>OTP</label>
    <input class="form-control" formControlName="code" />
  </div>

  <div class="mb-3">
    <label>New Password</label>
    <input type="password" class="form-control" formControlName="newPassword" />
  </div>

  <button class="btn btn-dark w-100" routerLink="login">Reset Password</button>

  <div class="alert alert-success mt-3" *ngIf="success">{{ success }}</div>
  <div class="alert alert-danger mt-3" *ngIf="error">{{ error }}</div>
</form>

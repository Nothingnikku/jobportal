
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <section class="card border-0 shadow rounded-4">
          <div class="card-body p-4">
            <h2 class="h4 fw-semibold mb-3">Freelancer Signup</h2>
            <form [formGroup]="form" (ngSubmit)="submit()">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Name</label>
                  <input class="form-control" formControlName="name" />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Email</label>
                  <input class="form-control" formControlName="email" />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Password</label>
                  <input type="password" class="form-control" formControlName="password" />
                  <div class="text-danger small mt-1" *ngIf="form.get('password')?.touched && form.get('password')?.errors?.['minlength']">
                    Password must be at least 6 characters.
                  </div>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Profile Title</label>
                  <input class="form-control" formControlName="profileTitle" />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Experience</label>
                  <input class="form-control" formControlName="experience" />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Hourly Rate</label>
                  <input type="number" class="form-control" formControlName="hourlyRate" />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Location</label>
                  <input class="form-control" formControlName="location" />
                </div>
                <div class="col-12">
                  <label class="form-label">Skills (comma separated)</label>
                  <input class="form-control" formControlName="skillsText" placeholder="Java, Spring Boot, React" />
                </div>
              </div>

              <div class="mt-4">
                <button type="button" class="btn btn-outline-secondary me-2" (click)="sendCode()">Send Verification Code</button>
                <div class="mt-3">
                  <label class="form-label">Email Verification Code</label>
                  <input class="form-control" formControlName="code" />
                </div>
                <button type="button" class="btn btn-outline-dark mt-2" (click)="verifyCode()">Verify Code</button>
              </div>

              <button class="btn btn-dark w-100 mt-4" [disabled]="form.invalid || !verified">Submit</button>
            </form>
            <div class="alert alert-success mt-3 mb-0 py-2" *ngIf="success">{{ success }}</div>
            <div class="alert alert-danger mt-3 mb-0 py-2" *ngIf="error">{{ error }}</div>
            <p class="small text-muted mt-3 mb-0">Signup request will be sent to admin for approval.</p>
          </div>
        </section>
      </div>
    </div>

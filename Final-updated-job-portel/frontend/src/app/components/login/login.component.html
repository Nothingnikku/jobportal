<div class="row justify-content-center min-vh-100 align-items-center dark-bg">
  <div class="col-lg-5">

    <section class="card cyber-glass border-0 rounded-4 hover-float">
      <div class="card-body p-4 p-md-5">

        <h2 class="h4 fw-semibold mb-4 cyber-title text-center">
          🚀 Login to SkillBridge
        </h2>

        <form [formGroup]="loginForm" (ngSubmit)="onLogin()">

          <div class="mb-3">
            <label class="form-label text-light">Email</label>
            <input class="form-control cyber-input"
                   formControlName="email">
          </div>

          <div class="mb-3">
            <label class="form-label text-light">Password</label>
            <input type="password"
                   class="form-control cyber-input"
                   formControlName="password">

            <div class="text-danger small mt-1"
                 *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['minlength']">
              Password must be at least 6 characters.
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label text-light">Role</label>
            <select class="form-select cyber-input"
                    formControlName="role">
              <option value="ADMIN">ADMIN</option>
              <option value="RECRUITER">RECRUITER</option>
              <option value="FREELANCER">FREELANCER</option>
            </select>
          </div>

          <button class="btn cyber-btn w-100"
                  [disabled]="loginForm.invalid">
            Login
          </button>
        </form>

        <div class="d-flex justify-content-between mt-4">
          <a routerLink="/forgot-password"
             class="small neon-link">
            Forgot password?
          </a>
          <a routerLink="/signup"
             class="small neon-link">
            Create account
          </a>
        </div>

        <div class="alert alert-success mt-3 mb-0 py-2"
             *ngIf="success">
          {{ success }}
        </div>

        <div class="alert alert-danger mt-3 mb-0 py-2"
             *ngIf="error">
          {{ error }}
        </div>

      </div>
    </section>

  </div>
</div>

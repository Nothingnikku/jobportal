<div class="row g-4">

  <!-- CREATE JOB (RECRUITER) -->
  <div class="col-lg-5" *ngIf="canCreateJobs">
    <section class="card cyber-glass p-4 hover-float">
      <h2 class="h5 mb-3 cyber-title">
        ⚡ Create Job
      </h2>

      <form [formGroup]="jobForm" (ngSubmit)="createJob()">

        <div class="mb-3">
          <label class="form-label text-light">Title</label>
          <input class="form-control cyber-input" formControlName="title">
        </div>

        <div class="mb-3">
          <label class="form-label text-light">Description</label>
          <textarea rows="3" class="form-control cyber-input" formControlName="description"></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label text-light">Location</label>
          <input class="form-control cyber-input" formControlName="location">
        </div>

        <div class="mb-3">
          <label class="form-label text-light">Employment Type</label>
          <select class="form-select cyber-input" formControlName="employmentType">
            <option value="FullTime">FullTime</option>
            <option value="PartTime">PartTime</option>
            <option value="Freelance">Freelance</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label text-light">Budget</label>
          <input type="number" class="form-control cyber-input" formControlName="budget">
        </div>

        <div class="mb-3">
          <label class="form-label text-light">Recruiter ID</label>
          <input type="number" class="form-control cyber-input" formControlName="recruiterId">
        </div>

        <div class="mb-3">
          <label class="form-label text-light">Skills</label>
          <input class="form-control cyber-input" formControlName="skillsText"
                 placeholder="Java, Spring Boot, React">
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox"
                 formControlName="active" id="activeJob">
          <label class="form-check-label text-light" for="activeJob">
            Active
          </label>
        </div>

        <button class="btn cyber-btn w-100"
                [disabled]="jobForm.invalid">
          🚀 Save Job
        </button>
      </form>
    </section>
  </div>

  <!-- SEARCH JOBS -->
  <div class="col-lg-7" [class.col-lg-12]="!canCreateJobs">
    <section class="card cyber-glass p-4 hover-float">

      <h2 class="h5 cyber-title mb-3">
        🔍 Search Jobs
      </h2>

      <div class="row g-2 mb-3">
        <div class="col-md-8">
          <input class="form-control cyber-input"
                 [(ngModel)]="searchTerm"
                 placeholder="Search by skill or title">
        </div>
        <div class="col-md-4 d-grid">
          <button class="btn cyber-btn"
                  (click)="applyFilter(true)">
            Search
          </button>
        </div>
      </div>

      <div class="d-flex flex-wrap gap-2 mb-3">
        <button class="btn btn-sm cyber-chip" (click)="quickType('')">All</button>
        <button class="btn btn-sm cyber-chip" (click)="quickType('FullTime')">FullTime</button>
        <button class="btn btn-sm cyber-chip" (click)="quickType('PartTime')">PartTime</button>
        <button class="btn btn-sm cyber-chip" (click)="quickType('Freelance')">Freelance</button>
        <button class="btn btn-sm cyber-chip ms-auto"
                (click)="clearFilter()">Clear</button>
      </div>

      <div class="alert alert-info py-2 cyber-alert"
           *ngIf="!isFreelancer">
        Login as a freelancer to apply or bookmark jobs.
      </div>

      <div class="table-responsive"
           *ngIf="filteredJobs.length > 0; else noJobs">
        <table class="table table-dark table-hover cyber-table align-middle">
          <thead>
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Type</th>
              <th>Budget</th>
              <th>Active</th>
              <th *ngIf="isFreelancer">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let job of filteredJobs">
              <td>{{ job.jobId }}</td>
              <td>{{ job.title }}</td>
              <td>{{ job.employmentType }}</td>
              <td>{{ job.budget }}</td>
              <td>
                <span class="badge"
                  [class.bg-success]="job.active"
                  [class.bg-danger]="!job.active">
                  {{ job.active ? 'Yes' : 'No' }}
                </span>
              </td>
              <td class="text-end" *ngIf="isFreelancer">
                <button class="btn btn-sm cyber-btn me-2"
                        (click)="goApply()"
                        [disabled]="isApplied(job.jobId)">
                  {{ isApplied(job.jobId) ? 'Applied' : 'Apply' }}
                </button>

                <button class="btn btn-sm cyber-outline"
                        (click)="toggleSave(job)">
                  {{ isSaved(job.jobId) ? 'Saved' : 'Bookmark' }}
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <ng-template #noJobs>
        <p class="text-secondary mb-0" *ngIf="searched">
          No match found or no jobs available.
        </p>
      </ng-template>

      <p class="small text-danger mb-0">{{ errorMessage }}</p>
    </section>
  </div>

</div>
